name: Daily grant portal scrape

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e "./python"

      - name: Scrape (optional Supabase + embeddings)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GRANT_OS_APP_URL: ${{ secrets.GRANT_OS_APP_URL }}
          GRANT_OS_INTERNAL_KEY: ${{ secrets.GRANT_OS_INTERNAL_KEY }}
        run: |
          FLAGS=""
          if [ -n "${SUPABASE_URL:-}" ] && [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            FLAGS="--push-supabase --embeddings-backfill"
          fi
          grant-scrape "https://www.grants.gov" -o python/output/grants.json $FLAGS

      - uses: actions/upload-artifact@v4
        with:
          name: grants-json
          path: python/output/grants.json
