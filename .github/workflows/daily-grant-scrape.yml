name: Daily grant portal scrape

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e "./python"

      - name: Run Firecrawl extract
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          grant-scrape "https://www.grants.gov" -o python/output/grants.json

      - uses: actions/upload-artifact@v4
        with:
          name: grants-json
          path: python/output/grants.json
