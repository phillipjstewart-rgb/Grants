name: CI

on:
  push:
    branches: [main, master, develop, "feat/**"]
  pull_request:
    branches: [main, master, develop]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build must not require real secrets; OpenAI routes fail at runtime if unset.
          OPENAI_API_KEY: sk-ci-placeholder-for-build-only

  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e "./python"

      - name: Import smoke test
        run: python -c "import grant_os; print('ok')"
